blueprint:
  name: Sonoff TRVZB - External Temperature Synchronization
  description: |
    This blueprint synchronizes temperature from a single external sensor to one or more
    Sonoff TRVZB valves.

    It iterates through all selected TRVs to:
    1. Ensure each TRV is set to 'external' mode.
    2. Update the temperature on each TRV if the threshold is met.
  domain: automation
  input:
    external_temperature_sensor:
      name: Source Temperature Sensor
      description: The external sensor providing the reference temperature.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
    trv_external_temperature_inputs:
      name: Sonoff TRV External Temperature Inputs
      description: Select all the number entities for the TRVs you want to sync.
      selector:
        entity:
          multiple: true
          filter:
            - domain: number
              device_class: temperature
    trv_temperature_sensor_selects:
      name: Sonoff TRV Mode Selections
      description: Select all the select entities for the TRVs to ensure they stay in 'external' mode.
      selector:
        entity:
          multiple: true
          filter:
            - domain: select
    temperature_change_threshold:
      name: Minimum Update Threshold
      description: |
        Minimum temperature change (in C) to trigger an update from the external sensor.
      default: 0.1
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          mode: slider
          unit_of_measurement: °C

mode: single

triggers:
  - platform: state
    entity_id: !input external_temperature_sensor
  - platform: time_pattern
    minutes: /30

variables:
  external_sensor: !input external_temperature_sensor
  trv_inputs: !input trv_external_temperature_inputs
  trv_selects: !input trv_temperature_sensor_selects
  threshold: !input temperature_change_threshold

conditions:
  - condition: template
    value_template: >
      {{ states(external_sensor) not in ['unknown', 'unavailable', None, 'none'] }}

actions:
  # 1. Loop through each select entity to ensure it is in 'external' mode
  - repeat:
      for_each: "{{ trv_selects }}"
      sequence:
        - condition: template
          value_template: "{{ states(repeat.item) != 'external' }}"
        - action: select.select_option
          data:
            entity_id: "{{ repeat.item }}"
            option: "external"
        - delay: "00:00:02"

  # 2. Loop through each temperature input to update values
  - repeat:
      for_each: "{{ trv_inputs }}"
      sequence:
        - variables:
            trv_entity: "{{ repeat.item }}"
            current_trv_value: "{{ states(trv_entity) | float(0) }}"
            new_sensor_value: "{{ states(external_sensor) | float(0) }}"

        - condition: template
          value_template: >
            {{ threshold == 0 or ((new_sensor_value - current_trv_value) | abs >= threshold) }}

        - action: number.set_value
          data:
            value: "{{ new_sensor_value }}"
            entity_id: "{{ trv_entity }}"
        - delay: "00:00:02"

  # 3. Log the update
  - action: system_log.write
    data:
      message: >
        [TRVZB Sync] Synced {{ external_sensor }} ({{ states(external_sensor) }} C)
        to selected TRVs.
      level: info